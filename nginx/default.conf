server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend app. Keep SPA-style fallback for direct refreshes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin relay for Mubert JSON API.
    location /mubert-api/ {
        proxy_pass https://api-app.mubert.com/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host api-app.mubert.com;
        proxy_set_header User-Agent "Mubert/3.0 (Google Pixel 6; en) Android/13";
        proxy_set_header Accept-Encoding "";

        # Mubert sets Domain=mubert.com; rewrite to whatever Host the browser used
        # for this dev relay. Strip Secure so plain-http localhost/LAN dev works.
        proxy_cookie_domain mubert.com $host;
        proxy_cookie_flags ~ nosecure samesite=lax;
    }

    # Same-origin audio relay. Browser sends the rewritten local mat cookie here;
    # nginx forwards it to Mubert's stream host.
    location /mubert-stream/ {
        proxy_pass https://stream.mubert.com/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Host stream.mubert.com;
        proxy_set_header User-Agent "Mubert/3.0 (Google Pixel 6; en) Android/13";
        proxy_set_header Cookie $http_cookie;
    }
}
